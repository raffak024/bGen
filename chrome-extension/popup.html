<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>bGen Form Filler</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 400px;
      min-height: 500px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: #333;
    }

    .container {
      padding: 20px;
    }

    .header {
      background: white;
      padding: 15px 20px;
      border-radius: 8px 8px 0 0;
      margin: -20px -20px 20px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    h1 {
      font-size: 18px;
      color: #667eea;
      font-weight: 600;
    }

    .card {
      background: white;
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 15px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }

    .form-group {
      margin-bottom: 15px;
    }

    label {
      display: block;
      margin-bottom: 5px;
      font-size: 13px;
      font-weight: 500;
      color: #555;
    }

    input, select {
      width: 100%;
      padding: 10px;
      border: 1px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      transition: border-color 0.3s;
    }

    input:focus, select:focus {
      outline: none;
      border-color: #667eea;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #667eea;
      color: white;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.3s;
    }

    button:hover {
      background: #5568d3;
    }

    button:disabled {
      background: #ccc;
      cursor: not-allowed;
    }

    .status {
      padding: 10px;
      border-radius: 6px;
      margin-bottom: 15px;
      font-size: 13px;
    }

    .status.success {
      background: #d4edda;
      color: #155724;
      border: 1px solid #c3e6cb;
    }

    .status.error {
      background: #f8d7da;
      color: #721c24;
      border: 1px solid #f5c6cb;
    }

    .status.info {
      background: #d1ecf1;
      color: #0c5460;
      border: 1px solid #bee5eb;
    }

    .hidden {
      display: none !important;
    }

    .report-item {
      padding: 12px;
      background: #f8f9fa;
      border-radius: 6px;
      margin-bottom: 8px;
      cursor: pointer;
      transition: background 0.2s;
      border: 2px solid transparent;
    }

    .report-item:hover {
      background: #e9ecef;
    }

    .report-item.selected {
      background: #e7f3ff;
      border-color: #667eea;
    }

    .report-title {
      font-weight: 600;
      margin-bottom: 4px;
    }

    .report-meta {
      font-size: 12px;
      color: #666;
    }

    .fill-button {
      margin-top: 15px;
      background: #28a745;
    }

    .fill-button:hover {
      background: #218838;
    }

    .logout-link {
      text-align: center;
      margin-top: 10px;
    }

    .logout-link a {
      color: white;
      font-size: 13px;
      text-decoration: none;
    }

    .logout-link a:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🚀 bGen Form Filler</h1>
    </div>

    <!-- Login View -->
    <div id="loginView">
      <div class="card">
        <div class="form-group">
          <label for="username">Benutzername</label>
          <input type="text" id="username" placeholder="userB oder userP">
        </div>
        <div class="form-group">
          <label for="password">Passwort</label>
          <input type="password" id="password" placeholder="test123">
        </div>
        <button id="loginButton">Anmelden</button>
      </div>
      <div id="loginStatus"></div>
    </div>

    <!-- Report Selection View -->
    <div id="reportsView" class="hidden">
      <div class="card">
        <h2 style="font-size: 16px; margin-bottom: 15px;">Bericht auswählen</h2>
        <div id="reportsList"></div>
        <button id="fillButton" class="fill-button" disabled>
          In Formular einfüllen
        </button>
      </div>
      <div class="logout-link">
        <a href="#" id="logoutLink">Abmelden</a>
      </div>
      <div id="fillStatus"></div>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
